services:
  easy-dataset:
    # 默认从本地源码构建（包含你的多用户协作功能）
    # 若想直接拉上游镜像，把 build 段注释掉，取消下方 image: ghcr.io/... 注释
    build:
      context: .
      dockerfile: Dockerfile
    # image: ghcr.io/conardli/easy-dataset   # 上游镜像，不含本仓库的 auth/team/audit/monitoring 改动
    image: easy-dataset:local
    container_name: easy-dataset
    restart: unless-stopped
    ports:
      - '1717:1717'
    env_file:
      # .env.local 是本机的部署 secret（被 .gitignore 忽略）
      # 必须包含 JWT_SECRET=<至少 32 位随机字符串>；可选 JWT_EXPIRES_IN
      # 生成：cp .env.example .env.local 然后 echo "JWT_SECRET=$(openssl rand -hex 32)" >> .env.local
      - .env.local
    environment:
      NODE_ENV: production
    volumes:
      # SQLite + schema 同目录持久化
      - ./prisma:/app/prisma
      # 上传文件、分块、项目目录持久化
      - ./local-db:/app/local-db
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1717/api/auth/init >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
